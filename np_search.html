<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WAND³ np search</title>
  <link rel="stylesheet" type="text/css" href="app.css" />
  <link rel="stylesheet" type="text/css"
        href="https://cdn.jsdelivr.net/npm/kekule/dist/themes/default/kekule.css" />
  <script src="https://cdn.jsdelivr.net/npm/kekule/dist/kekule.min.js"></script>
</head>
<body>
      <div class = home-help-box>
      <a href = "https://www.carlingblacklabel.co.za/">Help</a>
      <a href = main.html>Home</a>
    </div>
  <div class="app">
    <h1 class="main_heading">WAND<sup>3</sup></h1>
    <h2>Search natural products with text or Kekule Composer</h2>    
    <div id="composer" style="width:800px;height:400px;align-self: center;" data-widget="Kekule.Editor.Composer"></div>
    <script>
      Kekule.X.domReady(function () {
        Kekule.Widget.initAll(document);  
      });
    </script>
<!--button does nothing-->
    <div class="button-one">
      <button class="search-buttonINDIVIDUAL" id="btn-natural-products-structure" style="align-self: center;">
          Search structure
      </button>
    </div> 

    <form method="get" action="np_search.php" class="search-container">
      <!-- IMPORTANT: add name="q" so PHP sees $_GET['q'] -->
      <input
        id="search-input"
        name="q"
        type="text"
        placeholder="Search for natural products..."
        class="search-input"
        required
      />

      <div class="radio-buttons">
        <label>
          <input type="radio" name="search-type" value="name" checked>
          Name
        </label>
        <label>
          <input type="radio" name="search-type" value="smiles">
          SMILES
        </label>
        <label>
          <input type="radio" name="search-type" value="inchi">
          InChI
        </label>
        <label>
          <input type="radio" name="search-type" value="inchikey">
          InChIKey
        </label>
        <label>
          <input type="radio" name="search-type" value="pubmedids">
          PubChem CID
        </label>
      </div>

      <div class="button-one">
        <button class="search-buttonINDIVIDUAL" id="btn-natural-products">
          Search Natural Products
        </button>
      </div> 
    </form>    
  </div>
</body>
</html>
