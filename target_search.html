<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
  <title>WAND³ np search</title>
  <link rel="stylesheet" href="app.css" />
</head>
    <div class = home-help-box>
      <a href = "https://www.carlingblacklabel.co.za/">Help</a>
      <a href = main.html>Home</a>
    </div>
<body>
    <div class="app">
        <h1 class="main_heading">WAND<sup>3</sup></h1>
        <h2>Search targets</h2>    

        <form method="get" action="target_search.php" class="search-container">
            <input
                id="search-input"
                name="q"
                type="text"
                placeholder="Search for targets..."
                class="search-input"
                required
            />
            <div class = "radio-buttons">
                <label>
                    <input type = 'radio' name = 'search-type' value = 'name' id = 'exact-search' unchecked>
                    Name
                </label>
                <label>
                    <input type = 'radio' name = 'search-type' value = 'pdbid' id = 'exact-search' unchecked>
                    PDB accession
                </label>
                <label>
                    <input type = 'radio' name = 'search-type' value = 'uniprotid' id = 'exact-search' unchecked>
                    UniProt ID
                </label>
            </div>
            <div class = "button-one">
            <button class="search-buttonINDIVIDUAL" id="btn-targets">Search Targets</button>
            </div> 
        </form>    
    </div>
</body>
</html>
