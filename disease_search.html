    <div class="app">
        <h1 class="main_heading">WAND<sup>3</sup></h1>
        <h2>Search diseases</h2>    

    <form method="get" action="disease_search.php" class="search-container">
      <!-- IMPORTANT: add name="q" so PHP sees $_GET['q'] -->

        name="q"
        type="text"
        placeholder="Search for neurological diseases..."

        required

        <label>
          <input type="radio" name="search-type" value="name" checked>
          Name

          <input type="radio" name="search-type" value="icd11">
          ICD-11 Code
        </label>
        <label>
          <input type="radio" name="search-type" value="category">
          Category
        </label>
      </div>

      <div class="button-one">
        <button class="search-buttonINDIVIDUAL" id="btn-natural-products">
          Search Natural diseases

      </div>
